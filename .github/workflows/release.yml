name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to create/use for this release (example: v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Display name for the GitHub release"
        required: false
        type: string
      version:
        description: "Semver version injected into packaged artifacts (example: 0.1.0)"
        required: true
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as pre-release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Bump versions, commit, and tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Ensure workflow runs from a branch
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "workflow_dispatch must be run from a branch ref, got: ${GITHUB_REF_TYPE}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Set release metadata outputs
        id: meta
        run: |
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Validate tag does not already exist
        run: |
          if git rev-parse --verify --quiet "refs/tags/${{ inputs.tag }}"; then
            echo "Tag ${{ inputs.tag }} already exists locally."
            exit 1
          fi
          if git ls-remote --tags origin "${{ inputs.tag }}" | grep -q .; then
            echo "Tag ${{ inputs.tag }} already exists on origin."
            exit 1
          fi

      - name: Bump app versions
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const version = process.env.RELEASE_VERSION;
          const files = [
            "apps/server/package.json",
            "apps/desktop/package.json",
            "apps/web/package.json",
          ];

          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`, "utf8");
          }
          EOF
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/server/package.json apps/desktop/package.json apps/web/package.json
          if git diff --cached --quiet; then
            echo "No version change detected; refusing to create empty release commit."
            exit 1
          fi
          git commit -m "chore(release): bump app versions to ${{ inputs.version }}

          Co-authored-by: codex <codex@users.noreply.github.com>"

      - name: Create and push release tag
        run: |
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}"
          git push origin "${{ github.ref_name }}"
          git push origin "refs/tags/${{ inputs.tag }}"

  build-macos:
    name: Build and package macOS (${{ matrix.arch }})
    runs-on: macos-14
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64
          - x64
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and package macOS artifact
        run: |
          bun run dist:desktop:dmg -- --arch "${{ matrix.arch }}" --version "${{ needs.prepare-release.outputs.version }}"
          ls -lah release
        # TODO: Add production macOS signing and notarization in CI:
        # - Import Developer ID Application certificate + private key into keychain.
        # - Provide APPLE_ID / APPLE_TEAM_ID / APPLE_APP_SPECIFIC_PASSWORD secrets.
        # - Build with signing enabled and notarize + staple before release upload.

      - name: Generate SHA256 checksums
        run: |
          checksum_file="release/SHA256SUMS-${{ matrix.arch }}.txt"
          find release -maxdepth 1 -type f ! -name "SHA256SUMS-*.txt" -print0 \
            | xargs -0 shasum -a 256 > "$checksum_file"
          cat "$checksum_file"

      - name: Upload packaged artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ needs.prepare-release.outputs.tag }}-${{ matrix.arch }}
          path: release/*
          if-no-files-found: error

  publish-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-macos
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-${{ needs.prepare-release.outputs.tag }}-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || needs.prepare-release.outputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # TODO: Add a multi-platform release matrix and publish Linux/Windows installers:
        # - Linux: build/sign AppImage/deb/rpm artifacts on ubuntu runners.
        # - Windows: build/sign MSI/NSIS artifacts on windows runners.
        # - Consider per-platform updater metadata/signature publishing strategy.
